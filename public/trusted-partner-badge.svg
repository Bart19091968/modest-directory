<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 132" role="img" aria-label="Trusted Partner">
  <defs>
    <linearGradient id="tp-gold-outer" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE566"/>
      <stop offset="35%" stop-color="#F5B820"/>
      <stop offset="70%" stop-color="#D4860A"/>
      <stop offset="100%" stop-color="#7A4400"/>
    </linearGradient>
    <radialGradient id="tp-green" cx="38%" cy="28%" r="72%">
      <stop offset="0%" stop-color="#5ED177"/>
      <stop offset="40%" stop-color="#27933E"/>
      <stop offset="100%" stop-color="#124D22"/>
    </radialGradient>
    <linearGradient id="tp-gold-shine" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" stop-color="#FFF0A0" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#F5B820" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Gold outer shield -->
  <path d="M9 19 Q9 9 19 9 L101 9 Q111 9 111 19 L111 68 Q93 104 60 124 Q27 104 9 68 Z" fill="url(#tp-gold-outer)"/>

  <!-- Green inner shield -->
  <path d="M18 24 Q18 16 26 16 L94 16 Q102 16 102 24 L102 66 Q87 98 60 116 Q33 98 18 66 Z" fill="url(#tp-green)"/>

  <!-- Subtle shine on green -->
  <path d="M18 24 Q18 16 26 16 L94 16 Q102 16 102 24 L102 48 Q70 40 18 50 Z" fill="url(#tp-gold-shine)"/>

  <!-- TRUSTED text -->
  <text x="60" y="50" text-anchor="middle" fill="white" font-family="'Arial Black',Arial,Helvetica,sans-serif" font-weight="900" font-size="17" letter-spacing="0.5">TRUSTED</text>

  <!-- PARTNER text -->
  <text x="60" y="69" text-anchor="middle" fill="white" font-family="'Arial Black',Arial,Helvetica,sans-serif" font-weight="900" font-size="17" letter-spacing="0.5">PARTNER</text>

  <!-- Checkmark -->
  <path d="M30 84 L50 103 L90 73" stroke="white" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
